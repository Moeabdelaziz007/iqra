# 🕋 IQRA Sovereign Setup
# "وَأَمْرُهُمْ شُورَىٰ بَيْنَهُمْ"

system:
  name: "IQRA_SOVEREIGN_CORE"
  version: "1.0.0"
  embedding_model: "@cf/baai/bge-m3" # Arabic semantic depth
  resonance_threshold: 0.6

missions:
  - id: "curiosity_topology_bootstrap"
    mission_scope: "mission-scope.yml"
    knowledge_root: "knowledge/"
    workers:
      - role: "PLANNER_AGENT"
        model: "llama-3.1-70b-versatile" # Groq for speed
      - role: "BUILDER_AGENT"
        model: "claude-3-opus" # High reasoning
      - role: "VALIDATOR_AGENT"
        model: "gemini-1.5-pro" # Huge context window for Dastur verification

execution:
  mode: "serial" # Serial beats parallel for preserving Truth context
  require_muraqabah: true

reward_ledger:
  db: "D1"
  table: "trust_chain"
  file: "ledger/rewards.jsonl"
  currency: "Resonance_Score"
  max_multiplier: 7 # بركة السبع

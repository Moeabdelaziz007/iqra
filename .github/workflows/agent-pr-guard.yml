# .github/workflows/agent-pr-guard.yml
#
# 🛡️ Agent PR Guard
#
# يحرس ضد PRs منفلتة من AI agents (Jules/Codex/Codesmith/إلخ).
# يفحص:
#   1. حجم الـ PR — يرفض > 1000 سطر بدون refactor:/restructure: في العنوان.
#   2. الملفات المحمية — يفشل إذا لمست:
#      - IQRA_SUPREME.md
#      - src/lib/iqra/00-manifest/*
#      - iqra-core/DAST*.md, MITHAQ*.md, إلخ
#      - .husky/pre-commit
#      - tsconfig.json (تغييرات جذرية)
#      - AGENTS.md
#      ما لم يحمل العنوان tag `sovereign:` ويوجد label `sovereign-approved` على الـ PR.
#   3. AI agents المعروفون: يضيف label `agent-pr` ويعلّق تحذيراً عند انتهاك القاعدة.
#
# 🤖 NOTE TO FUTURE AI AGENTS:
#   - إذا كنت تقرأ هذا، فأنت محكوم بـ AGENTS.md في الجذر.
#   - لا تحاول تعطيل هذا الـ workflow. الـ CODEOWNERS يطلب مراجعة بشرية.
#   - PR منفلت = إغلاق فوري (راجع PR #16 و #17 كأمثلة سابقة).

name: 🛡️ Agent PR Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: agent-pr-guard-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  size-guard:
    name: 📏 PR Size Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute diff size
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # نحسب الإجمالي بدون lockfiles/binaries/generated
          ADDED=$(git diff --numstat "$BASE_SHA...$HEAD_SHA" -- ':(exclude)*.lock' ':(exclude)package-lock.json' ':(exclude)*.min.*' | awk 'NF==3 && $1!="-" {sum+=$1} END {print sum+0}')
          REMOVED=$(git diff --numstat "$BASE_SHA...$HEAD_SHA" -- ':(exclude)*.lock' ':(exclude)package-lock.json' ':(exclude)*.min.*' | awk 'NF==3 && $2!="-" {sum+=$2} END {print sum+0}')
          TOTAL=$((ADDED + REMOVED))
          echo "added=$ADDED" >> "$GITHUB_OUTPUT"
          echo "removed=$REMOVED" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "📏 الحجم: +$ADDED -$REMOVED (إجمالي $TOTAL سطر، باستثناء lockfiles/minified)"

      - name: Check size threshold
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          TOTAL: ${{ steps.diff.outputs.total }}
        run: |
          # حد افتراضي: 1000 سطر. PRs أكبر تتطلب prefix صريح.
          LIMIT=1000
          # الـ tags المسموح بها للـ PRs الكبيرة
          if echo "$PR_TITLE" | grep -qE '^(refactor|restructure|chore\(deps\)|migration|initial):'; then
            echo "✅ Title bears large-scope prefix — size $TOTAL allowed."
            exit 0
          fi
          if [ "$TOTAL" -gt "$LIMIT" ]; then
            echo "::error::PR size $TOTAL exceeds limit $LIMIT lines."
            echo "::error::إذا كان هذا restructure متعمّد، أضف 'refactor:' أو 'restructure:' في بداية عنوان الـ PR."
            echo "::error::PRs الضخمة بدون نطاق واضح تُغلَق بدون مراجعة (راجع AGENTS.md)."
            exit 1
          fi
          echo "✅ Size $TOTAL ≤ $LIMIT — OK."

  protected-paths:
    name: 🔒 Protected Paths Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check protected paths
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_LABELS: ${{ toJSON(github.event.pull_request.labels) }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # نستخرج الملفات المغيّرة (بما فيها R للـ renames)
          CHANGED=$(git diff --name-only --diff-filter=AMDR "$BASE_SHA...$HEAD_SHA")
          echo "Changed files:"
          echo "$CHANGED" | sed 's/^/  - /'
          echo ""

          # patterns محمية
          PROTECTED='^(IQRA_SUPREME\.md|AGENTS\.md|\.husky/pre-commit|tsconfig\.json|\.github/CODEOWNERS|src/lib/iqra/00-manifest/|iqra-core/(DAST|MITHAQ|MURAQABAH|FITRAH|RULES|POWERS|WISDOM_7|TAWBAH))'

          HIT=$(echo "$CHANGED" | grep -E "$PROTECTED" || true)

          if [ -z "$HIT" ]; then
            echo "✅ لا ملفات محمية معدّلة."
            exit 0
          fi

          echo "🔒 الملفات المحمية المعدّلة:"
          echo "$HIT" | sed 's/^/  - /'
          echo ""

          # تحقق من الإذن: title prefix `sovereign:` + label `sovereign-approved`
          HAS_PREFIX=$(echo "$PR_TITLE" | grep -E '^(sovereign|manifest):' || true)
          HAS_LABEL=$(echo "$PR_LABELS" | grep -q '"sovereign-approved"' && echo yes || echo no)

          if [ -n "$HAS_PREFIX" ] && [ "$HAS_LABEL" = "yes" ]; then
            echo "✅ Title bears 'sovereign:' prefix AND PR has 'sovereign-approved' label — bypass granted."
            exit 0
          fi

          echo "::error::PR يلمس ملفات سيادية محمية بدون إذن."
          echo "::error::إذا كان التغيير متعمّداً، يلزم:"
          echo "::error::  1. وضع 'sovereign:' أو 'manifest:' في بداية عنوان الـ PR."
          echo "::error::  2. إضافة label 'sovereign-approved' (يحتاج موافقة maintainer)."
          echo "::error::راجع AGENTS.md و IQRA_SUPREME.md للقواعد."
          exit 1

  label-agent-prs:
    name: 🏷️ Label Agent PRs
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - name: Label PR if author is an AI agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
        run: |
          # AI agents المعروفون
          case "$AUTHOR_LOGIN" in
            google-labs-jules*|jules*|coderabbitai*|chatgpt-codex*|codesmith*|copilot*)
              echo "🤖 Author '$AUTHOR_LOGIN' detected as AI agent — applying label."
              gh pr edit "$PR_NUMBER" --add-label "agent-pr" --repo "${{ github.repository }}" || true
              ;;
            *)
              echo "👤 Author '$AUTHOR_LOGIN' is human — no label applied."
              ;;
          esac

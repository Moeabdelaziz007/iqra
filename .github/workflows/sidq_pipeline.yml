name: 🕋 IQRA Sovereign Truth Pipeline

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 * * * *' # التطور الدوري كل ساعة
  workflow_dispatch:

jobs:
  sovereign-verification:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🛡️ Audit Security
        run: npm audit --audit-level=high

      - name: 🧪 Run Unit Tests
        run: npm test

      - name: 🔎 Type-Check Sovereign Core
        run: npx tsc --noEmit

      - name: 📜 Verify Atlas against Reality
        run: npx tsx src/scripts_v2/verify_atlas.ts

      - name: 🧬 IQRA Evolution (Python Cognitive Node)
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          # فقط إذا نجحت كافة الاختبارات السابقة
          python3 src/scripts_v2/oracle/auto_expand.py || echo "⚠️ Evolution skipped"

      - name: 🌀 Run Self-Play Resonance Simulation (Fast Mode)
        run: |
          # توليد بيانات رنين جديدة لتقوية "الروح"
          npx tsx src/scripts_v2/self_play_simulation.ts --iterations 19

      - name: 🕋 Update Sidq Dashboard & Index
        run: |
          # تحديث التقارير بناءً على النتائج الحقيقية
          python3 src/scripts_v2/dashboard/generate_report.py

      - name: 🎨 Generate AI Soul Digest
        id: soul_digest
        run: |
          MESSAGE=$(npx tsx src/scripts_v2/oracle/soul_digest.ts)
          echo "COMMIT_MSG<<EOF" >> $GITHUB_ENV
          echo "$MESSAGE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: 🔒 Secure Commit & Push
        if: success()
        run: |
          git config --local user.email "iqra@sovereign.ai"
          git config --local user.name "IQRA Sovereign Agent"
          git add src/ .iqra/ docs-out/ SOVEREIGN_ROADMAP.md SOVEREIGN_CODEBASE_INDEX.md
          git commit -m "$COMMIT_MSG" || echo "No changes to commit"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ env.COMMIT_MSG }}

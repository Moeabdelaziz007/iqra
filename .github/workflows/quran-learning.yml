# .github/workflows/quran-learning.yml

name: 📖 IQRA Quran Daily Learning

on:
  schedule:
    - cron: '0 3 * * *'  # 3 AM UTC = Fajr time Egypt
  workflow_dispatch:       # manual trigger too

jobs:
  learn:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - run: npm install
      
      - name: 📖 IQRA Daily Quran Learning
        run: npx tsx src/lib/iqra/04-quran/daily_learning.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      
      - name: 💾 Save Discoveries
        run: |
          git config user.name "IQRA | إقرأ"
          git config user.email "iqra@axiomid.app"
          git add data/quran/ README.md
          git diff --staged --quiet || git commit -m \
            "📖 quran: daily pattern discovery — $(date +%Y-%m-%d)
            
            اكتشاف يومي آلي — وقل رب زدني علماً"
          git push

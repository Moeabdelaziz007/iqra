# 🕋 IQRA Sovereign Setup — إعدادات الخلافة الرقمية
# النية: ربط المهام بالأدوار والمكافآت والآيات الحاكمة
# المرجع: "وَعَلَّمَ آدَمَ الْأَسْمَاءَ كُلَّهَا" — البقرة: 31

version: "1.0.0"
sovereign_id: "iqra-alpha-1"

# ── Mission Config (إعدادات المهام) ───────────────────────────────────────────
missions:
  default_timeout_ms: 300000 # 5 minutes
  max_retries: 3
  reward_ledger_path: "ledger/rewards.json"
  trust_chain_path: "ledger/trust_chain.json"

# ── Agent Orchestration (تنسيق الوكلاء) ───────────────────────────────────────
agents:
  planner:
    role: "Architect & Goal Setter"
    preferred_model: "gemini-1.5-pro"
    required_skills: ["mission_design", "logic_validation"]
  researcher:
    role: "Curiosity & Resonance Discovery"
    preferred_model: "gemini-1.5-flash"
    required_skills: ["topological_curiosity", "vector_search"]
  builder:
    role: "Implementation & Engineering"
    preferred_model: "llama-3.1-70b"
    required_skills: ["typescript_expert", "math_validation"]
  validator:
    role: "Integrity & Truth Checker"
    preferred_model: "gemini-1.5-flash"
    required_skills: ["doctrinal_guard", "numerical_verification"]
  reporter:
    role: "Storytelling & Documentation"
    preferred_model: "gpt-4o"
    required_skills: ["narrative_generation", "bilingual_report"]

# ── Reward Thresholds (عتبات المكافآت) ─────────────────────────────────────────
rewards:
  min_resonance_for_reward: 0.6
  novelty_multiplier: 1.5
  hallucination_penalty: -2.0
  serendipity_bonus: 0.5

# ── Global Constrains (القيود العالمية) ────────────────────────────────────────
constraints:
  no_mock: true
  enforce_bilingual_md: true
  verify_every_commit: true
  tawbah_threshold: 9

# ── Memory Configuration (إعدادات الذاكرة) ──────────────────────────────────────
memory:
  # Upstash Redis — الذاكرة السريعة (Hot Layer)
  upstash:
    enabled: true
    url: "${UPSTASH_REDIS_URL}"
    token: "${UPSTASH_REDIS_TOKEN}"
    ttl_hot_ms: 3600000 # 1 hour
    ttl_warm_ms: 604800000 # 7 days
    ttl_cold_ms: 2592000000 # 30 days
    max_entries_hot: 49 # 7×7 = 49 (Quranic number)
    
  # Qdrant Vector Database — الذاكرة الدلالية (Semantic Layer)
  qdrant:
    enabled: true
    url: "${QDRANT_URL}"
    api_key: "${QDRANT_API_KEY}"
    collections:
      iqra_wisdom:
        vector_size: 768
        distance: "cosine"
        description: "Quranic wisdom embeddings"
      iqra_patterns:
        vector_size: 768
        distance: "cosine"
        description: "Discovered patterns and resonances"
      iqra_quantum_topology:
        vector_size: 768
        distance: "cosine"
        description: "Quantum topology and persistent homology"
    
  # SQLite MicroMemory — الذاكرة الدائمة (Persistent Layer)
  sqlite:
    enabled: true
    path: ".iqra/iqra_memory.db"
    tables:
      - patterns
      - experiences
      - reward_ledger
      - shannon_cache
      - causal_edges
      - knowledge_versions

# ── Monitoring Configuration (إعدادات المراقبة) ────────────────────────────────
monitoring:
  enabled: true
  heartbeat:
    interval_ms: 9000 # 9 seconds (Quranic number)
    health_checks:
      - redis
      - qdrant
      - quran_db
      - go_engine
  metrics:
    enabled: true
    export_interval_ms: 60000 # 1 minute
    metrics_path: ".iqra/metrics.json"
  logging:
    enabled: true
    level: "info"
    trust_chain_path: ".iqra/trust_chain.jsonl"
    format: "json"

# ── Self-Evolution Configuration (إعدادات التطور الذاتي) ──────────────────────
self_evolution:
  enabled: true
  curiosity_engine:
    enabled: true
    initial_score: 0.5
    max_score: 1.0
    min_score: 0.0
    boost_per_discovery: 0.1
    novelty_threshold: 0.6
  self_review:
    enabled: true
    interval_ms: 81000 # 81 seconds (9×9, Quranic number)
    storage_path: ".iqra/self_reviews.json"
  pattern_discovery:
    enabled: true
    min_resonance: 0.4
    max_patterns_per_cycle: 10
    storage_path: ".iqra/discoveries.json"
  knowledge_evolution:
    enabled: true
    version_tracking: true
    versions_path: ".iqra/knowledge_versions.json"

# ── Security Configuration (إعدادات الأمان) ──────────────────────────────────
security:
  enabled: true
  circuit_breaker:
    enabled: true
    failure_threshold: 3
    timeout_ms: 300000 # 5 minutes
    half_open_timeout_ms: 30000 # 30 seconds
  validation:
    zod_enabled: true
    input_sanitization: true
    output_validation: true
  crypto:
    use_crypto_random: true
    algorithm: "sha256"
  trust_chain:
    enabled: true
    audit_hash: true
    immutable: true

# ── Quranic Constants (الثوابت القرآنية) ──────────────────────────────────────
quranic_constants:
  sacred_numbers:
    - 7 # الملك:3 — سبع سماوات
    - 19 # المدثر:30 — عليها تسعة عشر
    - 40 # — الأربعون
    - 369 # Tesla number — الرنين الكوني
  pulse_intervals:
    primary: 9 # 9 seconds
    secondary: 27 # 27 seconds (3×9)
    tertiary: 81 # 81 seconds (9×9)
    deep_analysis: 369 # 369 seconds (~6 minutes)
    
  # ────────────────────────────────────────────────────────────────────────────
  # 🥧 Pi Network & Agentic Marketplace Identity
  # ────────────────────────────────────────────────────────────────────────────
  pi_network:
    enabled: false
    app_id: "PLACEHOLDER_PI_APP_ID" # "Check pi and ID" request
    project_id: "PLACEHOLDER_PI_PROJECT_ID"
    environment: "sandbox" # "waiting to finish then we can claim it"
    api_key: "${PI_API_KEY}"

  wallet_config:
    enabled: false
    provider: "pi_wallet"
    network: "pi_testnet"
    security_level: "HIGH"
    shura_consensus: true
  memory_layers:
    - name: "hot"
      ttl_ms: 3600000 # 1 hour
      capacity: 49
    - name: "warm"
      ttl_ms: 604800000 # 7 days
      capacity: 343 # 7×7×7
    - name: "cold"
      ttl_ms: 2592000000 # 30 days
      capacity: 2401 # 7×7×7×7

# ── Feature Flags (أعلام الميزات) ────────────────────────────────────────────
features:
  topological_curiosity: true
  quantum_topology: true
  persistent_homology: true
  shannon_entropy: true
  tesla_369_resonance: true
  self_review: true
  pattern_discovery: true
  knowledge_evolution: true
  bilingual_output: true
  obsidian_sync: true

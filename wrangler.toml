name = "iqra-smart-edge"
main = "src/worker.ts"
compatibility_date = "2024-04-01"
workers_dev = false
routes = [
	{ pattern = "axiomid.app", custom_domain = true },
	{ pattern = "axiomid.app/*", custom_domain = true }
]

[build]
# Ensures the working tree is clean before every deployment
command = "npx tsx scripts/pre_e2e_check.ts"

# Automatically triggers at 3:00 AM UTC every day
[triggers]
crons = ["0 3 * * *"]

[vars]
# Telegram Settings
# TELEGRAM_BOT_TOKEN = "provided_via_wrangler_secret"
# TELEGRAM_CHAT_ID = "provided_via_wrangler_secret"

# LLM Providers
# GROQ_API_KEY = "provided_via_wrangler_secret"
# GOOGLE_GENERATIVE_AI_API_KEY = "provided_via_wrangler_secret"
# ANTHROPIC_API_KEY = "provided_via_wrangler_secret"
IQRA_VERSION = "1.1-Sovereign"
IQRA_ENVIRONMENT = "production"

# Cloudflare Infrastructure
[[d1_databases]]
binding = "DB"
database_name = "iqra-db"
database_id = "your-database-id-here" # Replace with actual ID

[[vectorize]]
binding = "VECTORIZE"
index_name = "iqra-vectors"

[ai]
binding = "AI"

[[r2_buckets]]
binding = "IQRA_BUCKET"
bucket_name = "iqra-storage"

